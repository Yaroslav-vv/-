name: Oracle Ampere Catcher

on:
  schedule:
    - cron: '*/15 * * * *'   # Каждые 15 минут
  workflow_dispatch:           # Ручной запуск

jobs:
  catch:
    runs-on: ubuntu-latest
    timeout-minutes: 14        # Страховочный лимит: убьёт job если завис

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Кэшируем OCI CLI — экономим ~40 сек на каждом запуске
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-oci-cli-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install OCI CLI
        run: pip install --quiet oci-cli

      # Записываем конфиг через echo-группу.
      # НЕ используем heredoc — он добавляет ведущие пробелы → OCI CLI падает.
      - name: Configure OCI credentials
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_API_KEY_PRIVATE }}
        run: |
          mkdir -p ~/.oci

          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_ID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_ID }}"
            echo "region=${{ secrets.OCI_REGION }}"
            echo "key_file=$HOME/.oci/oci_api_key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config

          # Приватный ключ через env-переменную — сохраняет переводы строк PEM
          echo "$OCI_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          echo "✅ OCI credentials configured"

      # Быстрая проверка: если credentials неверные — падаем сразу
      - name: Verify OCI connection
        run: |
          oci iam region list --output table \
            && echo "✅ OCI connection OK" \
            || { echo "❌ OCI connection FAILED — проверь секреты GitHub"; exit 1; }

      - name: Run Ampere Catcher
        env:
          # OCI — параметры инстанса
          OCI_COMPARTMENT_ID:       ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AVAILABILITY_DOMAIN:  ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID:            ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID:             ${{ secrets.OCI_IMAGE_ID }}
          # Email — уведомления (Gmail App Password)
          EMAIL_FROM:               ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD:           ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:                 ${{ secrets.EMAIL_TO }}
        run: |
          chmod +x catch_ampere.sh

          INTERVAL=290          # Пауза между попытками (чуть < 5 мин — запас на выполнение)
          END_TIME=$(( $(date +%s) + 800 ))   # 800 сек ≈ 13 мин (запас до job-таймаута)

          while [ "$(date +%s)" -lt "$END_TIME" ]; do
            ./catch_ampere.sh
            RC=$?

            case $RC in
              100)
                echo "🎉 Инстанс создан или лимит (код 100) — останавливаем цикл."
                exit 0
                ;;
              1)
                echo "🚨 Критическая ошибка (код 1) — останавливаем воркфлоу!"
                exit 1
                ;;
            esac

            # Проверяем остаток времени перед сном
            REMAINING=$(( END_TIME - $(date +%s) ))
            if [ "$REMAINING" -gt "$INTERVAL" ]; then
              echo "⏳ Ждём $INTERVAL сек... (осталось в сессии: ~${REMAINING} сек)"
              sleep "$INTERVAL"
            else
              echo "⏰ До конца сессии ${REMAINING} сек — завершаем."
              break
            fi
          done

          echo "✅ Сессия завершена. Следующая попытка — по расписанию (каждые 15 мин)."
